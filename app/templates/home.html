
<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Studenti studentům</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f9f9f9;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    header {
      background: #4f46e5;
      color: white;
      width: 100%;
      padding: 2rem 0;
    }

    .logo {
      font-size: 2.5rem;
      font-weight: bold;
    }

    .container {
      margin: 3rem auto;
      max-width: 600px;
    }

    p {
      font-size: 1.2rem;
      margin: 1rem 0 2rem;
    }

    .buttons a {
      margin: 0 1rem;
      padding: 0.8rem 1.6rem;
      background-color: #4f46e5;
      color: white;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      transition: background-color 0.3s ease;
    }

    .buttons a:hover {
      background-color: #3730a3;
    }

    footer {
      margin-top: auto;
      padding: 1rem;
      font-size: 0.9rem;
      color: #888;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">🎓 Studenti studentům</div>
  </header>

  <div class="container">
    <p>
      Doučování od studentů Gymnázia Jana Keplera – pro všechny, kdo se připravují na přijímačky.
    </p>
    <div class="buttons">
      <!-- Odkazy na jednotlivé stránky, správně používající názvy Blueprintů -->
      <a href="{{ url_for('main.about') }}">O projektu</a>
      <a href="{{ url_for('main.payment') }}">Koupit kurz</a>
    </div>
  </div>

  <footer>
    &copy; 2025 Studenti studentům. Všechna práva vyhrazena.
  </footer>
</body>
</html>
